# Parâmetros de comunicação
SET ODOM_CAN_BUS=vcan0
SET COMMAND_CAN_BUS=vcan0

# Parâmetro do local do mapa
SET MAP_PATH=../data/map_argos_holofre_20260514

# Parâmetros de visualização do mapa no Gui
SET MAP_X=1000.0
SET MAP_Y=1000.0

# Posição inicial do Robo no mapa
SET INITIAL_X=1000.0
SET INITIAL_Y=1000.0
SET INITIAL_THETA=-3.086
SET ORIGIN_X=980.0
SET ORIGIN_Y=980.0
SET ORIGIN_THETA=0.0
SET START_X=1000.0
SET START_Y=1000.0
SET START_THETA=0.0

# Posição do objetivo final (Final goal)
SET GOAL_X=1028.30
SET GOAL_Y=993.82
SET GOAL_THETA=-1.072

# Missão do robo
SET MISSION=argos/mission_go_to_ct13.txt

# Localização do Graph
#SET GRAPH=graph-ct13-copiadora.gr
SET GRAPH=graph-copiadora-ct13-2.gr

# Annotations (RDDF)
#SET ANNOTATIONS=argos/argos-rddf-ct13.txt

# Arquivo de calibração
SET CALIBRATION_FILE=calibration_table.txt

# Exemplo de entrada de proccontrol:
# module name		group_name	requested_state		watch_heartbeats	command_line

#### Serviccos de suporte
 jaus		 		support 	1		0		../sharedlib/OpenJAUS/ojNodeManager/bin/ojNodeManager ../sharedlib/OpenJAUS/ojNodeManager/nodeManager_Argos.conf a
 car_driver	  		support 	1		0		../sharedlib/OpenJAUS/ojArgos/bin/ojArgos ${ODOM_CAN_BUS} ${COMMAND_CAN_BUS}
 param_daemon			support	1		0		./param_daemon argos/carmen-argos.ini
 proc_control			support	1		0		./proccontrol_gui
 map_server			support	1		0		./map_server -map_path ${MAP_PATH} -map_x ${MAP_X} -map_y ${MAP_Y} -block_map on  -lanemap_incoming_message_type 0
 joystick			support	0		0		./joystick_vehicle -direct_v_and_phi_mode on

#### Robo
 ford_escape			robot		1		0		./ford_escape_hybrid -robot_model_name 4 -tune_pid_mode on > results_pid.txt
 base_ackerman			robot		1		0		./base_ackerman
 ros_odometry			robot		1		0		source ~/I2CA/argos/scripts/setup_argos.bash && ros2 run argos_drivers_cpp ros_to_carmen_odometry > ros_odometry.txt 
 ros_can_comm			robot		1		0		source ~/I2CA/argos/scripts/setup_argos.bash && ros2 run argos_drivers_cpp can_to_wirelesscontroller
  
#### Sensores
 XSENS				sensors	1		0		./xsens_argos
 OS1-32			sensors	0		0		./ouster -lidar_id 10
 camera1			sensors	0		0		./camera_drivers unitree1 1
 HESAI_32            		sensors       	1      		0       ./hesai_driver -lidar_id 5   
 
#### Processamento dos dados dos Sensores
 gps_xyz			sensor_filter	1		0		./gps_xyz

#### SLAM
 fused_odometry		SLAM		1		0		./fused_odometry -use_gps off -force_initial_pose on -initial_x ${INITIAL_X} -initial_y ${INITIAL_Y} -initial_theta ${INITIAL_THETA}
 localize			SLAM		1		0		./localize_ackerman -mapping_mode off
 mapper			SLAM		1		0		./mapper -map_path ${MAP_PATH}
 mapper_creator		SLAM		0		0		./mapper -map_path ${MAP_PATH} -mapping_mode on  -calibration_file ${CALIBRATION_FILE}
 od_mapper			SLAM		1		0		./obstacle_distance_mapper
 rndf_build			SLAM		0		0		./rddf_build ../data/rndf/rddf-ct13-corredor-20250903.txt

#### Hierarquia de controle (top-down)
 task_manager 			planner 	0		0		./task_manager -start_delay off -mission ${MISSION}
 route_planner			planner	1		0		./route_planner --graph ${MAP_PATH}/graphs/${GRAPH} ${MAP_PATH}/annotations/annotations.txt
 offroad_planner  		planner	1		0		./offroad_planner
 behavior_selector		planner	1		0		./behavior_selector
 MPP				planner   	1		0		./model_predictive_planner
 obstacle_avoider   		planner 	1		0		./obstacle_avoider

#### Interfaces
 navigator_gui			interface	1		0		./navigator_gui2 -map_path ${MAP_PATH} -annotation_path ${MAP_PATH}/annotations/annotations.txt
 viewer_3D			interface	0		0		./viewer_3D
 Cam_view			interface	0		0		./camera_viewer unitree1 1

#### Utilitarios
 fake_gps			utils		1		0		./util_publish_pose 20 ${START_X} ${START_Y} ${START_THETA}
 util_publish_initial_pose   	utils		1		0		./util_publish_initial_pose	${START_X}, ${START_Y}, ${START_THETA}, 4, 0.0
 util_publish_final_goal	utils		1		0		./util_publish_final_goal    ${GOAL_X} ${GOAL_Y} ${GOAL_THETA} 5
 LOG_CREATE			utils		0		0		./logger /dados/${LOG_PATH}
